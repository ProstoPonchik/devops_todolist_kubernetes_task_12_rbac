apiVersion: v1
kind: ServiceAccount
metadata:
  name: todoapp-service-account
  namespace: todoapp

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: todoapp-secret-reader
  namespace: todoapp
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todoapp-rolebinding
  namespace: todoapp
subjects:
- kind: ServiceAccount
  name: todoapp-service-account
  namespace: todoapp
roleRef:
  kind: Role
  name: todoapp-secret-reader
  apiGroup: rbac.authorization.k8s.io